services:
  postgres:
    image: postgres:16-alpine
    container_name: security_contracts_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=security_contracts
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: security_contracts_app
    ports:
      - "3000:3000"
    # Crea un archivo .env junto a este YAML: NEXTAUTH_URL debe ser la URL pública (ej. http://66.94.96.57:3000).
    # Docker Compose lee .env del directorio del proyecto para sustituir ${...} abajo.
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/security_contracts?schema=public}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-production-secret-change-this-min32chars!!}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
