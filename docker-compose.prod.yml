# Uso en el VPS (p. ej. Contabo): copie el repo, cree .env.production y ejecute:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Al arrancar, el contenedor app ejecuta `prisma migrate deploy` (tabla companies, etc.).
# Si la base ya tenía datos pero nunca migraciones Prisma, puede fallar con P3005:
#   aplique el SQL de prisma/migrations/... manualmente y marque la migración como aplicada, o use baseline.
#
# PostgreSQL solo escucha en la red interna de Docker (no expone 5432 al exterior).
# La app escucha en 0.0.0.0:3000 — ponga Nginx/Caddy delante con HTTPS o restrinja el firewall.

services:
  postgres:
    image: postgres:16-alpine
    container_name: security_contracts_db
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: security_contracts_app
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/login',{signal:AbortSignal.timeout(8000)}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      TZ: ${TZ:-America/Costa_Rica}
      NODE_ENV: production
      # Adjuntos de gastos (PDF/imágenes/Excel). Monte un volumen en esta ruta para persistencia.
      EXPENSE_UPLOAD_DIR: /data/expense-uploads
    volumes:
      - expense_uploads:/data/expense-uploads
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production

volumes:
  postgres_data:
  expense_uploads:
